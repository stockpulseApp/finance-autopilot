name: Generate daily blog post

on:
  schedule:
    # 6:00 AM UTC daily — adjust to your audience timezone
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-20250514
        run: node scripts/generate-daily-post.mjs

      - name: Commit and push
        run: |
          git config user.name "finance-autopilot-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/
          git diff --staged --quiet || git commit -m "chore: daily blog post $(date -u +%Y-%m-%d)"
          git push
